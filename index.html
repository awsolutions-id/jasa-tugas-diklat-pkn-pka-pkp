<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portofolio - Revisi</title>
    <style>
        /* Reset CSS dasar */
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #f9f9f9;
            color: #333;
        }

        /* Container utama */
        .container {
            max-width: 480px; /* Lebar HP */
            margin: 0 auto;
            background-color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header "Portofolio" atas */
        .header {
            text-align: center;
            padding: 20px 0;
            margin: 0;
            font-size: 28px;
            font-weight: bold;
            color: #0d47a1; /* Biru tua */
        }

        /* Grid untuk kotak foto */
        .portfolio-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            padding: 10px;
            flex-grow: 1; /* Biar footer selalu di bawah */
        }

        /* Gaya untuk setiap kotak portofolio */
        .portfolio-item {
            border: 2px solid #ffcc00; /* Bingkai kuning */
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            /* REVISI: Rasio aspek diubah menjadi lebih pendek (persegi panjang horizontal) */
            aspect-ratio: 4 / 3; /* Lebar : Tinggi, lebih pendek dari sebelumnya */
        }

        /* Placeholder untuk gambar (kotak abu-abu) */
        .image-placeholder {
            background-color: #ddd;
            flex-grow: 1; /* Mengisi sisa ruang kotak bingkai */
        }

        /* Tombol 'Lihat Detail' di bawah foto */
        .detail-button {
            background-color: #ffcc00; /* Warna kuning */
            color: #333;
            text-align: center;
            padding: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            border-top: 1px solid #ffcc00;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Ikon mata sederhana */
        .eye-icon {
            margin-right: 5px;
            font-size: 16px;
        }

        /* REVISI: Menghapus teks "Portofolio" di bagian bawah */
        /* (Teks "Portofolio" atas dipertahankan di .header) */

        /* Footer (kotak biru tua) */
        .footer {
            background-color: #0d47a1; /* Biru tua */
            color: #ffcc00; /* Teks kuning */
            text-align: center;
            padding: 15px 10px;
            margin-top: auto;
            border-top: 1px solid #ffcc00;
        }

        .footer p {
            margin: 0;
            font-size: 14px;
            line-height: 1.4;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="header">Portofolio</h1>

        <div class="portfolio-grid">
            <div class="portfolio-item">

            <div class="portfolio-item">
