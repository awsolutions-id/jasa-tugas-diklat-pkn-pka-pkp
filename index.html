<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portofolio Furnitur</title>
    <style>
        /* Gaya dasar untuk seluruh halaman */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f9f9f9;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Container untuk menampung konten portofolio */
        .container {
            max-width: 800px; /* Batasi lebar container agar rapi di layar besar */
            margin: 0 auto; /* Tengah-tengah halaman */
            padding: 20px;
            box-sizing: border-box;
            flex-grow: 1; /* Biar footer selalu di bawah */
        }

        /* Judul halaman */
        .title {
            text-align: center;
            color: #1a4f8b; /* Warna biru tua */
            margin-bottom: 30px;
        }

        /* Grid untuk menampung kotak-kotak portofolio */
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* 3 kolom */
            gap: 15px; /* Jarak antar kotak */
        }

        /* Gaya untuk setiap kotak portofolio (kuning) */
        .card {
            background-color: #fff;
            border: 2px solid #ffcc00; /* Garis kuning */
            padding: 10px;
            box-sizing: border-box;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between; /* Untuk menjaga proporsi */
            border-radius: 4px;
        }

        /* Placeholder untuk gambar (kotak abu-abu) */
        .image-placeholder {
            width: 100%;
            height: 120px; /* Atur tinggi placeholder */
            background-color: #e0e0e0;
            margin-bottom: 10px; /* Jarak ke elemen di bawahnya */
            border-radius: 2px;
        }

        /* Tombol 'Lihat Detail' */
        .detail-button {
            background-color: #ffcc00; /* Warna kuning */
            color: #333; /* Warna teks */
            border: none;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 5px; /* Jarak icon dan teks */
            font-size: 14px;
            font-weight: bold;
            width: 100%; /* Tombol memenuhi lebar kotak */
            justify-content: center; /* Teks tengah */
            box-sizing: border-box;
        }

        /* Ikon mata */
        .detail-button i {
            font-style: normal;
        }

        /* Footer halaman (biru) */
        .footer {
            background-color: #1a4f8b; /* Warna biru tua */
            color: #fff;
            text-align: center;
            padding: 15px;
            margin-top: auto; /* Biar nempel di bawah */
        }

        /* Responsif: Atur grid untuk layar kecil (HP) */
        @media (max-width: 600px) {
            .grid {
                grid-template-columns: repeat(2, 1fr); /* 2 kolom di HP */
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="title">Portofolio</h1>

        <div class="grid">
            <div class="card">
                <div class="image-placeholder"></div>
                <button class="detail-button">
                    <i>👁</i> Lihat Detail
                </button>
            </div>
            <div class="card"><div class="image-placeholder"></div><button class="detail-button"><i>👁</i> Lihat Detail</button></div>
            <div class="card"><div class="image-placeholder"></div><button class="detail-button"><i>👁</i> Lihat Detail</button></div>
            <div class="card"><div class="image-placeholder"></div><button class="detail-button"><i>👁</i> Lihat Detail</button></div>
            <div class="card"><div class="image-placeholder"></div><button class="detail-button"><i>👁</i> Lihat Detail</button></div>
            <div class="card"><div class="image-placeholder"></div><button class="detail-button"><i>👁</i> Lihat Detail</button></div>
            <div class="card"><div class="image-placeholder"></div><button class="detail-button"><i>👁</i> Lihat Detail</button></div>
            <div class="card"><div class="image-placeholder"></div><button class="detail-button"><i>👁</i> Lihat Detail</button></div>
            <div class="card"><div class="image-placeholder"></div><button class="detail-button"><i>👁</i> Lihat Detail</button></div>
            <div class="card"><div class="image-placeholder"></div><button class="detail-button"><i>👁</i> Lihat Detail</button></div>
            <div class="card"><div class="image-placeholder"></div><button class="detail-button"><i>👁</i> Lihat Detail</button></div>
            <div class="card"><div class="image-placeholder"></div><button class="detail-button"><i>👁</i> Lihat Detail</button></div>
        </div>
    </div>

    <footer class="footer">
        <p>Hak Cipta © 2024 Portofolio Furnitur. Semua Hak Dilindungi.</p>
    </footer>
</body>
</html>
